services:
  apapachar:
    build: .
    container_name: aly_apapachar
    ports:
      - "8003:8003"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
